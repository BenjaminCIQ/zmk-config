name: Build ZMK firmware (nix)
on:
  workflow_dispatch:
  push:
    paths:
      - config/**
      - build.yaml
      - draw/config.yaml

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Generate mirror layer
        run: python scripts/generate_mirror.py
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add config/dasbob.keymap
          git diff --staged --quiet || git commit -m "Generate swap-hands layer [skip ci]"
          git push

  build:
    needs: prepare
    uses: urob/zmk-actions/.github/workflows/build-user-config.yml@main
    with:
      # Set to 'gnuarmemb' (fastest), 'zephyr' or, 'zephyr-full' (most
      # compatible). ZMK Studio requires 'zephyr-full'.
      toolchain: zephyr

  draw:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
      - name: Set up build environment
        run: nix develop --command just init
      - name: Draw keymap
        run: nix develop --command just draw
      - name: Upload keymap images
        uses: actions/upload-artifact@v4
        with:
          name: keymap
          path: draw/*.svg
      - name: Commit updated images
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add draw/*.svg
          git diff --staged --quiet || git commit -m "Update keymap images [skip ci]"
          git push
